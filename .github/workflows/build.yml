name: Build Superset Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Build Docker image
        run: docker build --no-cache -t superset-custom .

      - name: Save image
        run: docker save superset-custom > superset.tar

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: superset-image
          path: superset.tar
