name: Build Superset Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Show files in repo
        run: |
          pwd
          ls -la

      - name: Build Docker image
        run: docker build --no-cache -t superset-custom .

      - name: Save Docker image
        run: docker save superset-custom > superset.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v5
        with:
          name: superset-image
          path: superset.tar
