name: Build Superset Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=1
          docker build --no-cache --progress=plain -t superset-custom:latest .

      - name: Test Python dependencies inside image
        run: |
          docker run --rm superset-custom:latest /app/.venv/bin/python -c "
          import psycopg2, pyodbc, pymysql, pandas, openpyxl, duckdb;
          import sqlalchemy;
          sqlalchemy.create_engine('duckdb:///:memory:');
          print('Python dependencies OK')
          "

      - name: Save Docker image
        run: docker save superset-custom:latest | gzip > superset.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: superset-image
          path: superset.tar.gz
          retention-days: 1
