name: Build Superset Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Build Docker image
        run: docker build -t superset-custom .

      - name: Save image
        run: docker save superset-custom > superset.tar

      - name: Upload image
        uses: actions/upload-artifact@v4   # ✅ already fixed
        with:
          name: superset-image
          path: superset.tar
